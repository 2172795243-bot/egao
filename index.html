<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>小惊喜</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  font-family: "Segoe UI", sans-serif;
  color:#e0f7ff;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* 星空背景 */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background:radial-gradient(white 1px, transparent 1px);
  background-size:3px 3px;
  animation:moveStars 60s linear infinite;
  opacity:0.3;
}

@keyframes moveStars{
  from{transform:translate(0,0);}
  to{transform:translate(-200px,-200px);}
}

/* 主卡片 */
.container{
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.5);
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,255,255,0.2);
  text-align:center;
  width:80%;
  max-width:600px;
}

/* 按钮 */
button{
  padding:12px 28px;
  font-size:16px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#00f0ff,#6a5cff);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00f0ff;
}

/* 文本 */
#text{
  margin-top:25px;
  line-height:1.7;
  font-size:16px;
  text-align:left;
  min-height:120px;
  white-space:pre-wrap;
}

/* 五彩文字 */
.rainbow{
  margin-top:20px;
  font-size:22px;
  font-weight:bold;
}

.rainbow span:nth-child(1){color:#ff4d4d;}
.rainbow span:nth-child(2){color:#ff944d;}
.rainbow span:nth-child(3){color:#ffe44d;}
.rainbow span:nth-child(4){color:#4dff88;}
.rainbow span:nth-child(5){color:#4dd2ff;}
.rainbow span:nth-child(6){color:#4d6aff;}
.rainbow span:nth-child(7){color:#b84dff;}
</style>

</head>
<body>

<div class="container">
  <button onclick="start()">点我一下</button>
  <div id="text"></div>
</div>

<script>
let content = 
"正在连接远程节点...\n\n" +
"信号稳定...\n" +
"正在同步环境数据...\n\n" +
"正在读取你的设备信息...\n" +
"正在分析你的行为轨迹...\n\n" +
"别紧张，这只是个普通的检测。\n\n" +
"不过有一件事让我有点在意...\n\n";

let finalText = "你看到我了吗？我看到你了";

let i = 0;
let speed = 35;

function start(){
  document.getElementById("text").innerHTML = "";
  i = 0;
  typeText();
}

function typeText(){
  if(i < content.length){
    document.getElementById("text").innerHTML += content.charAt(i);
    i++;
    setTimeout(typeText, speed);
  }else{
    setTimeout(showRainbow, 500);
  }
}

function showRainbow(){
  let rainbowHTML = '<div class="rainbow">';
  for(let j=0; j<finalText.length; j++){
    rainbowHTML += "<span>" + finalText[j] + "</span>";
  }
  rainbowHTML += "</div>";
  document.getElementById("text").innerHTML += rainbowHTML;
}
</script>

</body>
</html>
